name: Update YouTube RSS
on:
  schedule:
    # Chạy mỗi 20 phút (GitHub Cron miễn phí chạy ổn định nhất ở tầm 15-30p)
    - cron: '*/20 * * * *' 
  
  # Trigger Webhook: Cho phép gọi API từ bên ngoài (Cron-job.org / UptimeRobot)
  repository_dispatch:
    types: [trigger_update]
    
  # Cho phép nhấn nút "Run workflow" thủ công trên web
  workflow_dispatch:

permissions:
  contents: write # Quyền cực kỳ quan trọng để robot có thể Commit & Push file

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and Filter RSS
        # Bước này chạy file index.js để tạo ra file rss.xml mới
        run: node index.js

      - name: Commit and Push if changed
        run: |
          # Thiết lập danh tính robot
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add rss.xml
          
          git commit --allow-empty -m "Auto-update RSS: $(date)" || exit 0
          git push
        continue-on-error: true
